# RotaLog - API Frotas Configuration
# Legacy configuration with intentional debt

# Server
server.port=8080
server.servlet.context-path=/api

# Database - PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/rotalog?currentSchema=frotas
spring.datasource.username=rotalog_admin
spring.datasource.password=rotalog123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_schema=frotas

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.schemas=frotas

# Logging
logging.level.root=INFO
logging.level.com.rotalog=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.date-format=yyyy-MM-dd'T'HH:mm:ss

